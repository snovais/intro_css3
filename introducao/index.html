<!DOCTYPE html>
<!-- Define que estamos usando HTML5 -->

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Permite acentuação (muito importante para PT-BR) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site funcionar bem em celular -->

    <title>Guia CSS - Aula</title>

    <!-- BOA PRÁTICA ✅ -->
    <!-- Usar CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="topo">
        <h1>Meu Site</h1>
        <p class="subtitulo">Exemplo com boas práticas de CSS</p>
    </header>

    <!-- ================= MENU ================= -->
    <nav class="menu">
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </nav>

    <!-- ================= CONTEÚDO ================= -->
    <main class="container">

        <!-- CARD 1 -->
        <section class="card">
            <h2>Título 1</h2>
            <p>Este é um exemplo de conteúdo.</p>
        </section>

        <!-- CARD 2 -->
        <section class="card destaque">
            <h2>Título 2</h2>
            <p>Este card tem destaque.</p>
        </section>

    </main>

    <!-- ================= RODAPÉ ================= -->
    <footer class="rodape">
        <p>© 2026 - Aula de CSS</p>
    </footer>

</body>
</html>
